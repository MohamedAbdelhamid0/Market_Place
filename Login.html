<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .auth-wrapper { width: 100%; max-width: 420px; }

    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .auth-logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 16px;
    }

    .auth-title {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrapper { position: relative; }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      background: #fff;
    }
    .form-input:focus { border-color: #667eea; }
    .form-input.input-error { border-color: #ef4444; }
    .form-input.with-toggle { padding-right: 44px; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .error-msg  { font-size: 12px; color: #ef4444; margin-top: 5px; display: block; }
    .hint-msg   { font-size: 12px; margin-top: 5px; display: block; }
    .hint-match   { color: #10b981; }
    .hint-nomatch { color: #ef4444; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.9; }

    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: #6b7280;
    }

    .link-btn {
      background: none;
      border: none;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .link-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React + ReactDOM from CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel so JSX works without a build step -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Auth app (Login + Signup + navigation) -->
<script type="text/babel" src="auth.js"></script>
</body>
</html>
