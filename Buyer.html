<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marketplace Buyer App</title>

    <style>
      :root {
        --bg: #f4f7fb;
        --surface: rgba(255, 255, 255, 0.86);
        --surface-strong: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --delivered: #059669;
        --delivered-bg: #d1fae5;
        --shipping: #d97706;
        --shipping-bg: #fef3c7;
        --border: rgba(148, 163, 184, 0.22);
        --radius: 18px;
        --radius-sm: 12px;
        --radius-lg: 26px;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        --shadow-hover: 0 18px 40px rgba(15, 23, 42, 0.12);
        --danger: #dc2626;
        --danger-bg: #fee2e2;
        --nav-height: 64px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      }

      body {
        font-family: Inter, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), transparent 34%),
          radial-gradient(circle at top right, rgba(14, 165, 233, 0.18), transparent 28%),
          linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
        padding-bottom: calc(var(--nav-height) + 32px);
        line-height: 1.5;
      }

      .screen {
        display: none;
        padding: 20px;
        padding-bottom: 100px;
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 24px;
        box-shadow: var(--shadow);
        animation: fadeIn 0.28s ease;
      }

      .active { display: block; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .header {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 18px;
        color: var(--text);
        letter-spacing: -0.03em;
      }

      .rating {
        display: flex;
        gap: 6px;
      }

      .star {
        font-size: 20px;
        color: #cbd5e1;
        cursor: pointer;
        transition: transform 0.15s ease, color 0.15s ease;
        user-select: none;
      }

      .star:hover { transform: scale(1.15); }
      .star.active { color: #f59e0b; }

      .search-bar {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
        margin-bottom: 18px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      }

      .search-bar:focus {
        border-color: rgba(37, 99, 235, 0.5);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      .categories {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        margin-bottom: 18px;
        scrollbar-width: none;
      }

      .categories::-webkit-scrollbar { display: none; }

      .category {
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.82);
        border-radius: 999px;
        font-size: 14px;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
        cursor: pointer;
        white-space: nowrap;
        border: 1px solid rgba(148, 163, 184, 0.2);
        transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      }

      .category:hover { transform: translateY(-1px); }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .product-card {
        position: relative;
        background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.96));
        border-radius: 20px;
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        overflow: hidden;
      }

      .product-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 0%, rgba(37,99,235,0.03) 100%);
        pointer-events: none;
      }

      .product-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-hover);
        border-color: rgba(37, 99, 235, 0.18);
      }

      .product-img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 16px;
        margin-bottom: 12px;
        background: #e2e8f0;
      }

      .product-badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        background: #eff6ff;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .product-rating {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
        margin: 8px 0 6px;
        color: #f59e0b;
      }

      .product-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 6px;
        color: var(--text);
        line-height: 1.35;
      }

      .product-price {
        font-size: 16px;
        font-weight: 800;
        color: var(--accent);
      }

      .product-details {
        background: rgba(255, 255, 255, 0.92);
        padding: 20px;
        border-radius: 22px;
        margin-top: 20px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: var(--shadow);
      }

      .btn {
        margin-top: 15px;
        padding: 13px 16px;
        width: 100%;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      }

      .btn:active { transform: scale(0.98); }

      .order-btn {
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: white;
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
      }

      .order-btn:hover { box-shadow: 0 16px 28px rgba(37, 99, 235, 0.3); }

      .rate-btn {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        box-shadow: 0 12px 24px rgba(16, 185, 129, 0.2);
      }

      .order-card {
        background: rgba(255, 255, 255, 0.92);
        padding: 18px;
        border-radius: 22px;
        margin-bottom: 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: var(--shadow);
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      }

      .order-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
        border-color: rgba(37, 99, 235, 0.15);
      }

      .order-card__title {
        font-size: 1.05rem;
        font-weight: 800;
        margin-bottom: 8px;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      .order-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 7px 12px;
        border-radius: 999px;
        margin-bottom: 16px;
        letter-spacing: 0.01em;
      }

      .order-status--delivered {
        background: var(--delivered-bg);
        color: var(--delivered);
      }

      .order-status--shipping {
        background: var(--shipping-bg);
        color: var(--shipping);
      }

      .order-status--processing {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .order-status::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }

      .comment-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid rgba(148, 163, 184, 0.2);
      }

      .comment-box {
        width: 100%;
        min-height: 96px;
        padding: 14px 16px;
        font-family: inherit;
        font-size: 0.9375rem;
        color: var(--text);
        background: #f8fafc;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 14px;
        resize: vertical;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        margin-bottom: 12px;
      }

      .comment-box::placeholder { color: var(--text-muted); }
      .comment-box:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      .rate-btn {
        width: 100%;
        padding: 12px 20px;
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      .rate-btn:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
      .rate-btn:active { transform: scale(0.98); }

      textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-top: 10px;
        height: 100px;
      }

      .nav {
        display: flex;
        justify-content: space-around;
        gap: 10px;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(16px);
        padding: 10px;
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .nav__item {
        text-decoration: none;
        color: #475569;
        font-weight: 700;
        padding: 10px 16px;
        border-radius: 999px;
        transition: background 0.2s, color 0.2s, transform 0.2s;
      }

      .nav__item:hover {
        background: #eef2ff;
        color: #1d4ed8;
        transform: translateY(-1px);
      }

      .nav__item.active {
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: #fff;
      }

      .report-box {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 22px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: var(--shadow);
        padding: 24px;
      }

      .report-box .form-group { margin-bottom: 20px; }
      .report-box label {
        display: block;
        font-size: 0.875rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 8px;
      }

      .report-box .search-bar,
      .report-box textarea {
        width: 100%;
        padding: 14px 16px;
        font-family: inherit;
        font-size: 0.9375rem;
        color: var(--text);
        background: #f8fafc;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 14px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .report-box .search-bar { min-height: 48px; }
      .report-box textarea {
        min-height: 120px;
        resize: vertical;
      }

      .report-box .search-bar::placeholder,
      .report-box textarea::placeholder { color: var(--text-muted); }

      .report-box .search-bar:focus,
      .report-box textarea:focus {
        outline: none;
        border-color: var(--danger);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12);
      }

      .report-box .order-btn {
        width: 100%;
        padding: 14px 20px;
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #dc2626, #ef4444);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s, transform 0.1s;
      }

      .report-notice {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-top: 16px;
        padding: 12px;
        background: #f8fafc;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .buyer-hero {
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 45%, #38bdf8 100%);
        border-radius: var(--radius-lg);
        padding: 28px;
        margin-bottom: 24px;
        color: #fff;
        box-shadow: 0 18px 42px rgba(37, 99, 235, 0.28);
      }

      .buyer-hero::after {
        content: '';
        position: absolute;
        inset: auto -40px -40px auto;
        width: 180px;
        height: 180px;
        background: rgba(255,255,255,0.12);
        border-radius: 50%;
        filter: blur(4px);
      }

      .buyer-hero__greeting {
        font-size: 0.875rem;
        font-weight: 600;
        opacity: 0.9;
        margin-bottom: 4px;
        position: relative;
        z-index: 1;
      }

      .buyer-hero__name {
        font-size: 1.55rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        position: relative;
        z-index: 1;
      }

      .buyer-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        padding: 18px;
        text-align: center;
        box-shadow: var(--shadow);
        transition: box-shadow 0.2s, transform 0.1s;
      }

      .stat-card:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }

      .stat-card__value {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text);
        line-height: 1.2;
      }

      .stat-card__label {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 600;
        margin-top: 4px;
      }

      .buyer-section { margin-bottom: 24px; }

      .buyer-section__title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text);
      }

      .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        color: #ffffff;
      }

      .carousel {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        background: rgba(255,255,255,0.92);
        box-shadow: var(--shadow);
        border: 1px solid rgba(148, 163, 184, 0.18);
        margin-bottom: 20px;
      }

      .carousel-track {
        display: flex;
        transition: transform 0.45s ease;
        will-change: transform;
      }

      .carousel-slide {
        min-width: 100%;
        padding: 22px;
        display: grid;
        grid-template-columns: 1.2fr 0.9fr;
        gap: 16px;
        align-items: center;
      }

      .carousel-copy h3 {
        font-size: 1.4rem;
        line-height: 1.15;
        margin-bottom: 8px;
        color: var(--text);
        letter-spacing: -0.03em;
      }

      .carousel-copy p {
        color: var(--text-muted);
        margin-bottom: 14px;
      }

      .carousel-cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
      }

      .carousel-visual {
        height: 180px;
        border-radius: 20px;
        background-size: cover;
        background-position: center;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
      }

      .carousel-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 0 0 14px;
      }

      .carousel-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        border: none;
        background: rgba(100, 116, 139, 0.35);
        cursor: pointer;
        transition: width 0.2s, background 0.2s;
      }

      .carousel-dot.active {
        width: 24px;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
      }

      @media (max-width: 720px) {
        .product-grid { grid-template-columns: 1fr; }
        .buyer-stats { grid-template-columns: 1fr; }
        .carousel-slide { grid-template-columns: 1fr; }
        .carousel-visual { height: 160px; }
      }
    </style>
  </head>


<body>

<!-- Catalog Screen -->

<div class="screen active" id="home">
  <div id="home-root"></div>

</div>

<!-- Orders Screen -->

<div class="screen" id="orders">
  <div id="orders-root"></div>
</div>
<!-- Buyer -->
<div class="screen" id="buyer">
  <div class="buyer-hero">
    <div class="buyer-hero__greeting">Welcome back</div>
    <div class="buyer-hero__name" id="buyer-profile-name">Buyer</div>
  </div>
  <div class="buyer-stats">
    <div class="stat-card">
      <div class="stat-card__value" data-buyer-orders-count>0</div>
      <div class="stat-card__label">Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" data-buyer-total-payment>$0</div>
      <div class="stat-card__label">Spent</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value">5</div>
      <div class="stat-card__label">Saved</div>
    </div>
  </div>
  <div class="buyer-section">
    <h2 class="buyer-section__title">Quick actions</h2>
    <div class="quick-actions">
      <a href="#" class="quick-action">
        <span class="quick-action__icon">🔍</span>
        <span>Track order</span>
      </a>
      <a href="#" class="quick-action">
        <span class="quick-action__icon">❤️</span>
        <span>Wishlist</span>
      </a>
      <a href="#" class="quick-action">
        <span class="quick-action__icon">📍</span>
        <span>Addresses</span>
      </a>
      <a href="#" class="quick-action">
        <span class="quick-action__icon">💳</span>
        <span>Payment</span>
      </a>
    </div>
  </div>
  <div class="trust-badge">
    <div class="trust-badge__icon">✓</div>
    <div class="trust-badge__text">
      <strong>Verified buyer</strong>
      <span>Your account is in good standing</span>
    </div>
  </div>
</div>

<!-- Report -->
<div class="screen" id="report">
  <h1 class="header">Report Seller</h1>
  <div class="report-box">
    <div class="form-group">
      <label for="report-order">Order</label>
      <select id="report-order" class="search-bar" aria-label="Select order to report">
        <option value="">Loading your orders...</option>
      </select>
    </div>
    <div class="form-group">
      <label for="report-seller">Seller</label>
      <input type="text" id="report-seller" class="search-bar" placeholder="Select an order first" readonly>
    </div>
    <div class="form-group">
      <label for="report-reason">Reason</label>
      <textarea id="report-reason" placeholder="Describe the issue (e.g. item not as described, late delivery, poor communication)…" rows="4"></textarea>
    </div>
    <button type="button" class="btn order-btn">Submit report</button>
    <p class="report-notice">Reports are reviewed within 24–48 hours. We may contact you for more details.</p>
  </div>
</div>




<!-- Bottom nav -->
<nav class="nav">
  <a href="#" class="nav__item active" data-screen="home">
    🏠 Home
  </a>
  <a href="#" class="nav__item" data-screen="orders">
    📦 Orders
  </a>
  <a href="#" class="nav__item" data-screen="buyer">
    👤 Buyer
  </a>
  <a href="#" class="nav__item" data-screen="report">
    ⚠️ Report
  </a>
</nav>

<!-- React UMD builds -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel so we can write JSX in app.js -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type= "text/babel" src="buyer2.js"></script>
</body>
</html>
